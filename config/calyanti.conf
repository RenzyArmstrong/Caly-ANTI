# =============================================================================
# Caly Anti - XDP/eBPF DDoS mitigation suite
# Sample configuration.  Install to /etc/calyanti/calyanti.conf
# =============================================================================
#
# READ THIS FIRST
# ---------------
# The defaults shipped in this file are deliberately SAFE, not TIGHT.  They are
# tuned so that a fresh install on a machine you have never profiled will not
# drop legitimate traffic and will not lock you out.  That means several of the
# most effective controls are either off or set to thresholds a real attack
# will comfortably exceed.
#
# Every block that needs your attention before this becomes a real defence is
# marked:
#
#     ### TIGHTEN ###
#
# Work through those blocks once you have a week of baseline data from
# `calyanti-cli top` and `calyanti-cli stats`.  Tightening blind is how you take
# your own service down.
#
#
# HOW THIS FILE MAPS TO THE DATAPLANE
# -----------------------------------
# Scalar keys map 1:1 onto a field of `struct fw_config` (src/bpf/common.h),
# which is copied verbatim into the `caly_config` BPF array map.  The field
# name is written in the comment above each key as:  -> fw_config.<field>
#
# List-valued directives (CIDRs, per-port rules, ICMP type policy, interfaces)
# cannot live in a fixed-size struct.  They populate BPF maps directly and are
# marked:  -> map <name>.  A 65536-entry port table is a map, not a struct
# field; that is not an inconsistency, it is the only way it can work.
#
#
# VALUE SYNTAX
# ------------
#   booleans    yes / no / true / false / on / off / 1 / 0
#   durations   integer plus a unit: ns us ms s m h d.  A bare integer is
#               SECONDS.  Stored internally as nanoseconds.
#   rates       integer, optional decimal suffix k = 1e3, m = 1e6, g = 1e9.
#               Packet rates are packets/second.  Byte rates are BYTES/second,
#               not bits: 125m = 125,000,000 B/s = 1 Gbit/s.
#   sizes       integer, optional suffix k/m/g (1e3/1e6/1e9) or ki/mi/gi
#               (1024/1024^2/1024^3).
#   lists       comma separated; whitespace around items is ignored.
#   comments    '#' to end of line.  Blank lines ignored.
#
# Section headers exist purely to organise this file.  Keys are globally
# unique; moving a key between sections changes nothing.
#
# Reload with `systemctl reload calyanti` or `calyanti-cli reload`.  A reload
# rewrites `caly_config` and the policy maps in place; it never detaches the
# XDP program, so there is no window where the box is unprotected.
#
# =============================================================================


# -----------------------------------------------------------------------------
[general]
# -----------------------------------------------------------------------------

# Master switch.  When off, the XDP program is still attached and still counts
# every packet, but returns XDP_PASS unconditionally.  Use this instead of
# detaching, so you keep your statistics while you debug.
#   -> fw_config.flags bit CALY_F_ENABLED
enabled = yes

# Evaluate every rule, report every verdict, but never actually drop.  This is
# the single most valuable setting during the first week of a deployment: run
# monitor_only for a few days, read `calyanti-cli stats`, confirm the only
# things it *would* have dropped are things you want dropped, then turn it off.
#
# Shipped OFF, because a firewall that silently does nothing is a worse default
# than one that does its job.  Turn it ON deliberately while you tune.
#   -> fw_config.flags bit CALY_F_MONITOR_ONLY
monitor_only = no

# Starting operating mode.  The daemon moves between normal / elevated /
# under-attack automatically from the global gauges below; this is only the
# state it boots into.  lockdown and monitor-only are manual states - the
# daemon will not escalate into or out of them on its own.
# Values: normal | elevated | under-attack | lockdown | monitor-only
#   -> fw_config.mode
mode = normal

# Address families to inspect.  Turning ipv6 off does NOT pass IPv6 traffic,
# it drops it (STAT_DROP_IP6_DISABLED).  If you do not run IPv6, prefer to
# leave this on and let the policy engine handle it, so you can see what is
# arriving.
#   -> fw_config.flags bits CALY_F_IPV4 / CALY_F_IPV6
ipv4 = yes
ipv6 = yes

# Daemon verbosity: 0 error, 1 warn, 2 info, 3 debug, 4 trace.
#   -> fw_config.log_level
log_level = 2

# Daemon loop timings.  poll_interval is the event ring poll timeout;
# stats_interval is how often the global gauges are sampled and differentiated
# into rates (and therefore how quickly mode escalation can react);
# gc_interval is how often idle map entries are swept.
#   -> fw_config.poll_interval_ms / stats_interval_ms / gc_interval_ms
poll_interval = 200ms
stats_interval = 1s
gc_interval = 5s

# Entries examined per garbage-collection sweep.  Keep this modest: the sweep
# walks BPF maps with a syscall per batch and a huge value adds latency spikes.
#   -> fw_config.gc_batch
gc_batch = 4096


# -----------------------------------------------------------------------------
[dataplane]
# -----------------------------------------------------------------------------

# Which rung of the degradation ladder to use.  `auto` probes downward from the
# best available:
#
#   xdp-native  -> xdp-generic -> tc-bpf -> nftables -> iptables+ipset
#
# Pin this only if auto-detection picks wrong.  Pinning to a rung the kernel or
# NIC cannot provide is a fatal startup error, by design: silently running a
# weaker dataplane than the operator asked for is worse than refusing to start.
# Values: auto | xdp-native | xdp-generic | tc-bpf | nftables | iptables
#   -> fw_config.dataplane_pref
dataplane = auto

# XDP attach mode when the dataplane is XDP.
#   auto     try native, fall back to generic
#   native   XDP_FLAGS_DRV_MODE, requires driver support
#   generic  XDP_FLAGS_SKB_MODE, works anywhere, roughly 5x slower
#   offload  XDP_FLAGS_HW_MODE, Netronome-class NICs only
#
# Note: XDP is unavailable inside OpenVZ and most LXC containers, and native
# XDP on virtio-net needs multiqueue with at least as many queues as CPUs.  The
# installer detects all three cases and drops to the next rung.
#   -> fw_config.xdp_attach_pref
xdp_mode = auto

# Perf/ring event buffer pages per CPU.  Must be a power of two.  16 pages is
# 64 KiB per CPU, enough to absorb an event burst without losing samples.
#   -> fw_config.event_pages
event_pages = 16


# -----------------------------------------------------------------------------
[interfaces]                                            # -> map caly_iface
# -----------------------------------------------------------------------------

# Per-interface zone and overrides.  Syntax:
#
#   interface = <name> zone=<wan|lan|dmz> [flags...]
#
# Flags: monitor, disabled, drop-private, no-ipv6, trust-vlan
#
# The zone matters: bogon and martian filtering, and RFC1918-source rejection,
# only apply on WAN-zone interfaces.  Applying them to a LAN interface will
# drop your own internal traffic.
#
# An interface with no entry here uses `default_zone` below.
#
# interface = eth0 zone=wan drop-private
# interface = eth1 zone=lan
# interface = wg0  zone=lan
# interface = lo   zone=lan disabled

# Zone assumed for any interface not listed above.  `lan` is the safe default:
# it means an unconfigured interface gets policy but not martian filtering.
#
### TIGHTEN ###  Set your real internet-facing NIC to zone=wan explicitly.
#                Bogon filtering, RFC1918-source rejection and the reflection
#                filter are the cheapest wins in this whole file and they are
#                inert until an interface is in the WAN zone.
#   -> fw_config.default_zone
default_zone = lan


# -----------------------------------------------------------------------------
[management]
# -----------------------------------------------------------------------------
#
#  ############################################################
#  #  THE LOCKOUT-PREVENTION SECTION.  READ IT.               #
#  ############################################################
#
# Ports listed here are checked BEFORE every drop rule, in every mode,
# including under-attack and lockdown.  Traffic to them is never dropped by
# port policy, by the blocklist, by a dynamic ban, or by scan detection.
#
# TCP port 22 is FORCED into this list by the loader.  If you delete it from
# this file it is put back; if you write a config that would remove it, the
# loader refuses the whole config and keeps running the previous one.  This is
# not negotiable and it is not a bug.  A box that is under attack is exactly
# when you most need to be able to log in.
#
# If you moved SSH off 22, ADD your real port here - do not assume removing 22
# and adding 2222 works, because 22 will be re-added and you will simply have
# both.  That is fine and intended.
#   -> fw_config.mgmt_tcp_ports[] / fw_config.mgmt_tcp_count
mgmt_tcp_ports = 22

# Examples if you administer over something other than SSH.  Uncomment and edit.
# mgmt_tcp_ports = 22, 2222, 9090          # 9090 = cockpit
#   -> fw_config.mgmt_udp_ports[] / fw_config.mgmt_udp_count
mgmt_udp_ports =
# mgmt_udp_ports = 51820                   # WireGuard management tunnel
# mgmt_udp_ports = 1194                    # OpenVPN management tunnel

# Should management ports also bypass the per-source token buckets?
#
# YES (default) is the safe answer: it means a rate-limit misconfiguration, or
# an attacker deliberately burning your per-source budget, cannot throttle you
# out of your own SSH session.  The exposure is that SSH itself is then
# unprotected by Caly Anti - protect it with key-only auth and, ideally, by
# allowlisting your admin network below.
#
### TIGHTEN ###  The genuinely correct configuration is: keep this yes, AND put
#                your admin source networks in the [allowlist], AND close 22 to
#                everyone else at the port-policy level.
#   -> fw_config.flags bit CALY_F_MGMT_BYPASS_ALL
mgmt_bypass_ratelimit = yes


# -----------------------------------------------------------------------------
[allowlist]                                # -> maps caly_allow4 / caly_allow6
# -----------------------------------------------------------------------------

# The operator escape hatch.  An allowlist hit returns XDP_PASS immediately,
# before the blocklist, before bans, before every rate limiter and before every
# anomaly rule.  Nothing in this suite can drop a packet from an allowlisted
# source.
#
# Put your admin networks, your monitoring probes, your load balancers and your
# backup servers here.  Keep the list short: an allowlisted source that gets
# compromised walks straight past every control below.
#
### TIGHTEN ###  Replace these examples with your real admin networks.  A
#                deployment with an empty allowlist is one automation mistake
#                away from a self-inflicted outage.
#
# allow = 203.0.113.0/24          # office egress
# allow = 198.51.100.10/32        # monitoring probe
# allow = 2001:db8:1234::/48      # office IPv6
allow =

# Allowlisted sources skip the token buckets too.  Leave on unless you
# specifically want an allowlisted-but-noisy source still rate limited.
#   -> rule_meta.flags bit CALY_RULE_F_BYPASS_RATE on inserted entries
allowlist_bypass_ratelimit = yes

# Master toggle for the allowlist lookup.  There is no reason to turn this off.
#   -> fw_config.flags bit CALY_F_ALLOWLIST
allowlist_enabled = yes


# -----------------------------------------------------------------------------
[local]                                    # -> maps caly_local4 / caly_local6
# -----------------------------------------------------------------------------

# The prefixes this machine actually owns.  Used for two things:
#   - anti-spoofing: a packet arriving on a WAN interface claiming a source
#     inside one of these prefixes is forged (STAT_DROP_SRC_SELF);
#   - direction inference for conntrack-lite.
#
# The daemon auto-populates this from the interface addresses at startup and
# refreshes it on netlink address changes.  Entries here are added on top, for
# addresses that are routed to you but not configured on an interface (failover
# IPs, anycast ranges, floating VIPs).
#
# local = 192.0.2.0/24
local =


# -----------------------------------------------------------------------------
[blocklist]                                # -> maps caly_block4 / caly_block6
# -----------------------------------------------------------------------------

# Static, operator-controlled deny list.  Checked after the allowlist, so an
# address in both is allowed - the escape hatch always wins.
#
# Threat-intelligence feeds are loaded into the same maps by
# `calyanti-cli feed`, tagged so a feed refresh does not clobber your manual
# entries.
#
# block = 192.0.2.66/32
# block = 2001:db8:bad::/48
block =

#   -> fw_config.flags bit CALY_F_BLOCKLIST
blocklist_enabled = yes


# -----------------------------------------------------------------------------
[anomaly]
# -----------------------------------------------------------------------------
#
# These are the cheap, high-confidence checks.  Everything in this section
# drops traffic that is malformed or physically impossible, not traffic that is
# merely excessive.  False positives here are very rare, which is why they are
# all on by default.

# Truncated headers, IPv4 ihl < 5, tot_len < ihl*4, TCP data offset < 5, and
# every other structural impossibility.
#   -> fw_config.flags bit CALY_F_ANOMALY_CHECKS
anomaly_checks = yes

# LAND attack: source address equals destination address.
#   -> fw_config.flags bit CALY_F_LAND_CHECK
land_check = yes

# Bogon/martian sources on WAN interfaces: 0.0.0.0/8, 127.0.0.0/8,
# 169.254.0.0/16, 224.0.0.0/4 as a source, 240.0.0.0/4, the documentation
# ranges, and for IPv6 ::, ::1 and multicast-as-source.
#   -> fw_config.flags bit CALY_F_BOGON_FILTER
bogon_filter = yes

# Treat RFC1918 and CGNAT (100.64/10) sources arriving on a WAN interface as
# martian.  Correct for a machine facing the public internet.
#
# WRONG, and will break you, if your "WAN" interface is actually behind a NAT
# gateway, in a cloud VPC with private addressing, or on a provider network
# that uses CGNAT.  Check before enabling.  This is why it ships OFF.
#
### TIGHTEN ###  On a true public-facing host, turn this on.
#   -> fw_config.flags bit CALY_F_WAN_DROP_PRIVATE
wan_drop_private = no

# Illegal TCP flag combinations: null scan, FIN-only, SYN+FIN, SYN+RST,
# FIN+RST, xmas (FIN+PSH+URG) and all-flags-set.  ECE and CWR are legitimate
# ECN signalling and are never treated as anomalies.
#   -> fw_config.flags bit CALY_F_TCP_FLAG_CHECKS
tcp_flag_checks = yes

# Fragment sanity: reject fragments smaller than frag_min_size, reject
# frag_off == 1 (the classic header-overlap evasion), reject fragmented ICMP.
#   -> fw_config.flags bit CALY_F_FRAG_CHECKS
frag_checks = yes

# Minimum size for a non-final fragment.  Anything smaller cannot carry a
# complete transport header and exists only to evade inspection.
#   -> fw_config.frag_min_bytes
frag_min_size = 128

# Drop ALL fragments, legitimate ones included.  Paranoid.  Breaks large DNS
# over UDP, some VPN encapsulation and any path where PMTUD is already broken.
#   -> fw_config.flags bit CALY_F_DROP_ALL_FRAGS
drop_all_fragments = no

# Drop IPv4 packets carrying options (ihl > 5).  Source routing is the classic
# abuse.  Options are essentially extinct on the modern internet, but some
# older monitoring gear still emits Record Route.
#   -> fw_config.flags bit CALY_F_DROP_IP4_OPTIONS
drop_ip4_options = no

# Drop IPv6 routing header type 0.  RH0 was deprecated by RFC 5095 precisely
# because it is a traffic-amplification primitive.  There is no legitimate use.
#   -> fw_config.flags bit CALY_F_DROP_RH0
drop_ipv6_rh0 = yes

# Minimum acceptable IPv4 TTL / IPv6 hop limit.  0 disables the check.
# Non-zero values are a blunt instrument: they reject distant but legitimate
# clients.  Only useful when you know every client is within N hops.
#   -> fw_config.ip_min_ttl
min_ttl = 0

# Drop ethertypes that are neither IPv4, IPv6 nor ARP.  Off by default so that
# LLDP, PPPoE discovery, 802.1X and friends keep working.
#   -> fw_config.flags bit CALY_F_DROP_UNKNOWN_L3
drop_unknown_ethertype = no

# Parse depth limits.  These may only LOWER the compile-time bounds baked into
# the verifier-checked loops (VLAN 2, IPv6 ext headers 8, tunnel 1); raising
# them above those constants is clamped, not honoured.
#   -> fw_config.vlan_max_depth / ip6_ext_max / tunnel_max_depth
vlan_max_depth = 2
ipv6_ext_max = 8
tunnel_max_depth = 1

# Inspect 802.1Q / 802.1ad (QinQ) tags and one level of IPIP / IP6IP6 / GRE
# encapsulation, so policy applies to the inner header rather than the wrapper.
#   -> fw_config.flags bits CALY_F_VLAN_INSPECT / CALY_F_TUNNEL_INSPECT
vlan_inspect = yes
tunnel_inspect = yes

# Minimum TCP data offset in 32-bit words.  5 is the protocol minimum; there is
# no reason to change it.
#   -> fw_config.tcp_min_doff
tcp_min_doff = 5


# -----------------------------------------------------------------------------
[icmp]                                # -> maps caly_icmp4_pol / caly_icmp6_pol
# -----------------------------------------------------------------------------

# Master toggle for ICMP type filtering.
#   -> fw_config.flags bit CALY_F_ICMP_FILTER
icmp_filter = yes

# Maximum ICMP payload in bytes, after the ICMP header.  Larger is dropped
# (STAT_DROP_ICMP_OVERSIZE) - this is the ping-of-death / ICMP-flood control.
# 1472 keeps a standard 1500-MTU ping working.
#   -> fw_config.icmp_max_payload / icmp6_max_payload
icmp_max_payload = 1472
icmp6_max_payload = 1472

# Per-type policy.  Syntax:  icmp4_type = <type> <drop|pass|ratelimit>
#
# Unlisted types default to drop when icmp_filter is on.
#
#  ############################################################
#  #  DO NOT DROP THESE.  IT WILL BREAK YOUR NETWORK.         #
#  ############################################################
#
# ICMPv4 type 3 (Destination Unreachable) carries code 4, Fragmentation
# Needed.  Drop it and you black-hole Path MTU Discovery.  The symptom is the
# most confusing failure in networking: TCP connects fine, small requests
# work, then anything large hangs forever.  The loader REFUSES a config that
# sets type 3 to drop.
icmp4_type = 0  pass          # echo reply - answers to your own pings
icmp4_type = 3  pass          # dest unreachable - MANDATORY, carries PMTUD
icmp4_type = 8  ratelimit     # echo request - ping, rate limited not dropped
icmp4_type = 11 pass          # time exceeded - traceroute, TTL expiry
icmp4_type = 12 pass          # parameter problem

# ICMPv6 is not optional the way ICMPv4 is.  IPv6 has no ARP; neighbour
# discovery IS ICMPv6.  Dropping types 133-136 does not harden the host, it
# disconnects it.  Type 2 (Packet Too Big) is the only PMTUD mechanism IPv6
# has, because routers do not fragment.
#
# The loader REFUSES a config that sets types 2, 133, 134, 135 or 136 to drop.
icmp6_type = 1   pass         # dest unreachable
icmp6_type = 2   pass         # packet too big - MANDATORY, PMTUD
icmp6_type = 3   pass         # time exceeded
icmp6_type = 4   pass         # parameter problem
icmp6_type = 128 ratelimit    # echo request
icmp6_type = 129 pass         # echo reply
icmp6_type = 130 pass         # MLD query
icmp6_type = 131 pass         # MLD report
icmp6_type = 132 pass         # MLD done
icmp6_type = 133 pass         # router solicitation  - MANDATORY
icmp6_type = 134 pass         # router advertisement - MANDATORY
icmp6_type = 135 pass         # neighbour solicit    - MANDATORY
icmp6_type = 136 pass         # neighbour advert     - MANDATORY
icmp6_type = 137 drop         # redirect - accepted only from on-link routers
icmp6_type = 143 pass         # MLDv2 report


# -----------------------------------------------------------------------------
[ratelimit]
# -----------------------------------------------------------------------------
#
# Per-SOURCE token buckets.  Nanosecond refill, integer arithmetic, no floating
# point.  `rate` is the sustained limit, `burst` is the bucket depth - how much
# a source may send in one go after being idle.
#
# Exceeding any bucket does not drop the packet outright on its own: it costs
# the source a strike.  Accumulate `strike_limit` strikes inside
# `strike_window` and the source is banned for `ban_ttl_base`, escalating on
# repeat offences.
#
### TIGHTEN ###  EVERY DEFAULT BELOW IS DELIBERATELY GENEROUS.  They are sized
#                so a busy legitimate client is never touched, which also means
#                a small botnet will not be either.  Run monitor_only for a
#                week, look at your 99th-percentile per-source rates in
#                `calyanti-cli top`, and set these to roughly 4x that.

#   -> fw_config.flags bit CALY_F_RATE_LIMIT
ratelimit_enabled = yes

# Total packets per second from one source.
#   -> fw_config.tb_rate[CALY_TB_PPS] / fw_config.tb_burst[CALY_TB_PPS]
rate_pps = 200k
rate_pps_burst = 400k

# Total BYTES per second from one source.  250m = 2 Gbit/s.
#   -> fw_config.tb_rate[CALY_TB_BPS] / fw_config.tb_burst[CALY_TB_BPS]
rate_bps = 250m
rate_bps_burst = 500m

# TCP SYN packets per second from one source.  This is the per-source half of
# SYN flood defence; the global half is in [attack] below.
#   -> fw_config.tb_rate[CALY_TB_SYN] / fw_config.tb_burst[CALY_TB_SYN]
rate_syn = 2k
rate_syn_burst = 4k

# UDP packets per second from one source.
#   -> fw_config.tb_rate[CALY_TB_UDP] / fw_config.tb_burst[CALY_TB_UDP]
rate_udp = 50k
rate_udp_burst = 100k

# ICMP + ICMPv6 packets per second from one source.
#   -> fw_config.tb_rate[CALY_TB_ICMP] / fw_config.tb_burst[CALY_TB_ICMP]
rate_icmp = 200
rate_icmp_burst = 400

# New connections (conntrack misses) per second from one source.
#   -> fw_config.tb_rate[CALY_TB_NEWCONN] / fw_config.tb_burst[CALY_TB_NEWCONN]
rate_newconn = 500
rate_newconn_burst = 1k

# Setting any rate or burst to 0 disables that bucket entirely.  A disabled
# bucket always passes - a misconfigured limiter must never black-hole traffic.

# How many rate_state entries to keep.  One per active source address.  Backed
# by an LRU hash, so this is a memory ceiling, not a failure point: under a
# spoofed-source flood the LRU evicts cold entries instead of refusing inserts.
# Roughly 128 bytes of value plus key and hash overhead per entry.
#   -> fw_config.max_rate_entries
max_rate_entries = 524288

# Evict per-source state idle longer than this.
#   -> fw_config.rate_idle_ns
rate_idle_timeout = 5m


# -----------------------------------------------------------------------------
[banning]
# -----------------------------------------------------------------------------

# Dynamic bans, inserted by the dataplane, expired by timestamp.
#   -> fw_config.flags bit CALY_F_AUTOBAN
autoban = yes

# Strikes required inside strike_window before a source is banned.
#   -> fw_config.strike_limit / fw_config.strike_window_ns
strike_limit = 10
strike_window = 60s

# Ban duration for a first offence, and the ceiling for repeat offenders.
#   -> fw_config.ban_ttl_base_ns / fw_config.ban_ttl_max_ns
ban_ttl_base = 10m
ban_ttl_max = 24h

# Escalation on repeat offence: next_ttl = ttl * num / den, clamped to
# ban_ttl_max.  2/1 doubles each time: 10m, 20m, 40m, 80m ... up to 24h.
# Set num = den to disable escalation and use a flat ban_ttl_base.
#   -> fw_config.ban_escalate_num / fw_config.ban_escalate_den
ban_escalate_num = 2
ban_escalate_den = 1

# Dedicated TTLs for the two highest-confidence ban triggers.  Port scanning
# and participating in a reflection attack are unambiguous, so they earn a
# longer ban than a generic rate-limit overrun.
#   -> fw_config.ban_ttl_scan_ns / fw_config.ban_ttl_amp_ns
ban_ttl_scan = 1h
ban_ttl_amp = 6h

# Ban table capacity, per address family.  LRU: full means the coldest ban is
# evicted, never that a new ban fails.
#   -> fw_config.max_ban_entries
max_ban_entries = 262144

# Static blocklist and allowlist capacity (LPM tries).
#   -> fw_config.max_block_entries / max_allow_entries
max_block_entries = 262144
max_allow_entries = 65536

# Per-interface override table capacity.
#   -> fw_config.max_iface_entries
max_iface_entries = 64


# -----------------------------------------------------------------------------
[amplification]
# -----------------------------------------------------------------------------

# Reflection / amplification filter.  Drops UDP whose SOURCE port is a known
# amplifier - the signature of being used as a reflection target - UNLESS the
# flow is in conntrack, meaning we initiated it.
#
# That conntrack exemption is what makes this safe.  Your own DNS lookups and
# NTP syncs create outbound state and their replies match it, so they pass.
# Unsolicited traffic claiming to come from port 53 or 123 does not.
#   -> fw_config.flags bit CALY_F_ANTI_AMPLIFY
anti_amplification = yes

# The built-in amplifier source-port list, seeded into caly_port_udp at load:
#
#    17 qotd        19 chargen     53 DNS         69 TFTP       111 portmap
#   123 NTP        137 NetBIOS    161 SNMP       389 CLDAP      520 RIP
#   623 IPMI      1434 MSSQL     1900 SSDP      3283 ARD       5093 Sentinel
#  5351 NAT-PMP   5353 mDNS     11211 memcached 27015 Steam   30718 Lantronix
# 37810 DVR
#
# If you legitimately RUN one of these services and need to accept unsolicited
# traffic from that source port, clear the flag for it:   -> map caly_port_udp
#
# amp_exempt = 53          # you operate an authoritative DNS server
# amp_exempt = 123         # you operate a public NTP server
amp_exempt =

# Add source ports to the amplifier list.                 -> map caly_port_udp
# amp_extra = 11212
amp_extra =


# -----------------------------------------------------------------------------
[ports]                            # -> maps caly_port_tcp / caly_port_udp
# -----------------------------------------------------------------------------

# Per-protocol, per-port inbound policy.  Backed by two 65536-entry arrays, so
# a lookup is one bounds-checked index - no hashing, no per-rule cost.
#
# Syntax:
#   tcp_port = <port|range> <closed|open|ratelimit> [rate=<pps>] [burst=<pkts>]
#   udp_port = <port|range> <closed|open|ratelimit> [rate=<pps>] [burst=<pkts>]
#
# Modes:
#   closed     inbound dropped unless conntrack matches (so outbound-initiated
#              flows still get their replies) or the source is allowlisted
#   open       inbound permitted, still subject to per-source token buckets
#   ratelimit  inbound permitted up to a per-PORT token bucket, independent of
#              the per-source ones
#
# Default deny.  When ON, any port without an explicit rule is `closed`.  This
# is the correct end state and the whole reason the port table exists.
#
# It ships OFF because turning it on without first listing your services
# blackholes them the moment you reload.  Outbound-initiated traffic keeps
# working either way - that is what conntrack-lite is for - so the risk is
# purely to inbound services you forgot to list.
#
### TIGHTEN ###  This is the single most valuable line in this file.  Enumerate
#                your listening services below (`ss -lntup` is your friend),
#                run monitor_only for a day to catch what you missed, then set
#                this to yes.
#   -> fw_config.flags bit CALY_F_DEFAULT_DENY
default_deny = no

# Master toggle for port policy evaluation.
#   -> fw_config.flags bit CALY_F_PORT_POLICY
port_policy = yes

# --- your inbound services -------------------------------------------------
# Port 22 is here for completeness; it is additionally protected by the
# [management] section, which is checked earlier and cannot be overridden.
tcp_port = 22    open
# tcp_port = 80    ratelimit rate=50k burst=100k
# tcp_port = 443   ratelimit rate=50k burst=100k
# tcp_port = 25    ratelimit rate=2k  burst=4k
# tcp_port = 53    ratelimit rate=20k burst=40k
# udp_port = 53    ratelimit rate=20k burst=40k
# udp_port = 443   ratelimit rate=50k burst=100k   # QUIC / HTTP3
# udp_port = 51820 open                            # WireGuard

# Explicitly closing a port that nothing listens on costs nothing and makes the
# statistics readable:
# tcp_port = 23    closed          # telnet
# tcp_port = 3389  closed          # RDP
# udp_port = 1900  closed          # SSDP


# -----------------------------------------------------------------------------
[conntrack]
# -----------------------------------------------------------------------------

# Conntrack-lite.  An LRU hash on the 5-tuple; an established entry
# short-circuits straight to XDP_PASS, skipping every rule below the allowlist.
#
# This is what makes inbound default-deny survivable: your outbound
# connections' replies match existing state and are never evaluated against the
# port policy.  Turning it off with default_deny on will break every
# outbound-initiated flow you have.
#   -> fw_config.flags bit CALY_F_CONNTRACK
conntrack = yes

# Entries are created from inbound handshakes seen by the XDP program and, when
# a tc/clsact egress hook is available, from locally-initiated outbound flows.
# Without the egress hook, outbound-initiated UDP (DNS, NTP, QUIC) has no
# inbound handshake to learn from, so its replies rely on the port policy
# instead.  The installer attaches the egress hook wherever clsact is
# supported; this is only a fallback concern on very old kernels.
#   -> fw_config.flags bit CALY_F_CAP_TC_EGRESS (probed, not settable here)

# Flow timeouts.
#   -> fw_config.ct_tcp_syn_ns / ct_tcp_est_ns / ct_tcp_fin_ns
ct_tcp_syn = 60s
ct_tcp_established = 4h
ct_tcp_fin = 30s

#   -> fw_config.ct_udp_ns / ct_udp_stream_ns
ct_udp = 30s
ct_udp_stream = 180s

#   -> fw_config.ct_icmp_ns / ct_generic_ns
ct_icmp = 30s
ct_generic = 60s

# Note on ct_tcp_established: a long-idle TCP session whose entry expires is
# not killed.  Its next packet simply falls through to the port policy.  For
# management ports that is always a pass; for a service port it is a pass while
# default_deny is off.  With default_deny on, raise this above your longest
# expected idle period, or keep the service port `open`.

# Conntrack table capacity.  LRU, so this is a memory ceiling.  Each entry is
# a 40-byte key plus a 64-byte value plus hash overhead.
#   -> fw_config.max_conn_entries
max_conn_entries = 262144


# -----------------------------------------------------------------------------
[portscan]
# -----------------------------------------------------------------------------

# Sliding-window distinct-destination-port detection, per source.  Implemented
# as a 512-bit Bloom filter in the per-source state, so it costs two hashes and
# two word writes - no per-port table, no allocation.
#
# The Bloom filter can collide, which makes the distinct-port estimate slightly
# LOW.  That biases towards not banning, which is the safe direction.
#   -> fw_config.flags bit CALY_F_PORTSCAN_DETECT
portscan_detect = yes

# Distinct destination ports from one source within scan_window before that
# source is banned for ban_ttl_scan.
#
# 60 ports in 30 seconds will not trigger on any normal client.  It will not
# catch a patient scanner either - a slow scan at 1 port/minute is invisible to
# any windowed detector, by construction.  Lower this if you are seeing scans
# you want caught; watch for false positives from clients that legitimately
# open many parallel connections to different ports.
#   -> fw_config.scan_port_threshold / fw_config.scan_window_ns
scan_port_threshold = 60
scan_window = 30s

#   -> fw_config.max_scan_entries / fw_config.scan_idle_ns
max_scan_entries = 131072
scan_idle_timeout = 5m


# -----------------------------------------------------------------------------
[synproxy]
# -----------------------------------------------------------------------------
#
#  ############################################################
#  #  REQUIRES:  sysctl net.ipv4.tcp_syncookies = 2           #
#  ############################################################
#
# The SYN proxy answers inbound SYNs from XDP with a SYN-ACK carrying a kernel
# generated SYN cookie, and never touches the TCP stack until the client
# completes the handshake.  A spoofed SYN flood therefore costs one XDP_TX and
# zero kernel memory per packet: there is no half-open socket to exhaust.
#
# It is built exclusively on bpf_tcp_raw_gen_syncookie_ipv4/ipv6() and
# bpf_tcp_raw_check_syncookie_ipv4/ipv6(), which are KERNEL 5.15 OR NEWER.
#
# Those helpers use the kernel's own cookie secret.  That is the entire point.
# A hand-rolled cookie hash cannot be validated by the TCP stack, so the
# handshake can never be spliced into a real socket and every connection dies
# silently.  If the helpers are unavailable, the answer is to rate limit, not
# to reimplement the cookie.
#
# net.ipv4.tcp_syncookies MUST be 2 (unconditional), not the usual 1.  At 1 the
# kernel only issues cookies once the accept queue overflows, so the cookies
# our XDP program already handed out will not be recognised on the way back in.
# The installer sets this in /etc/sysctl.d/98-calyanti.conf.
#
# ON KERNELS OLDER THAN 5.15 the SYN proxy program is not loaded at all
# (libbpf_probe_bpf_helper decides, and the program is marked autoload=false so
# the verifier never sees a helper it does not have).  The fallback is the
# per-source rate_syn bucket above plus syn_fallback_pps below, with
# net.ipv4.tcp_syncookies = 1.  That is meaningfully weaker.  It is also the
# reason this suite still runs on RHEL 8.
#
#   -> fw_config.flags bit CALY_F_SYNPROXY
#      (CALY_F_CAP_SYNPROXY is set by the loader after probing, read-only)
synproxy = yes

# Which ports get SYN-proxied.  Syntax: synproxy_port = <port|range>
# Empty means every port whose policy is open or ratelimit.
#
# SYN-proxying a port costs one extra round trip on every new connection, so
# restrict it to ports that actually get flooded if that latency matters.
# synproxy_port = 80
# synproxy_port = 443
synproxy_port =

# Global SYN rate, summed across all sources, that engages the SYN proxy and
# moves the daemon into under-attack mode.  Hysteresis: escalate above _hi,
# de-escalate below _lo, never oscillate in between.
#   -> fw_config.global_syn_pps_hi / global_syn_pps_lo
global_syn_pps_high = 40k
global_syn_pps_low = 15k

# Pre-5.15 fallback only: hard global cap on inbound SYNs per second once the
# SYN proxy is unavailable.  0 disables the cap and leaves you relying purely
# on the per-source rate_syn bucket.
#   -> fw_config.syn_fallback_pps
syn_fallback_pps = 100k


# -----------------------------------------------------------------------------
[attack]
# -----------------------------------------------------------------------------

# Global gauges that drive automatic mode escalation.  The daemon samples the
# per-CPU counters every stats_interval, differentiates them into a rate, and
# compares against these.  The dataplane never makes this decision itself -
# it only ever reads fw_config.mode.
#
# Hysteresis pairs: cross _high upward to escalate, fall below _low to
# de-escalate.  Keep a wide gap or you will flap.
#   -> fw_config.global_pps_hi / global_pps_lo
global_pps_high = 4m
global_pps_low = 2m

# 1.25g bytes/s = 10 Gbit/s.   -> fw_config.global_bps_hi / global_bps_lo
global_bps_high = 1250m
global_bps_low = 800m

#   -> fw_config.global_newconn_pps_hi / global_newconn_pps_lo
global_newconn_pps_high = 100k
global_newconn_pps_low = 50k

# Minimum time to remain escalated after the rates fall back below the low
# marks.  Prevents an attacker from probing the threshold to make you
# oscillate between policies.
#   -> fw_config.attack_dwell_ns
attack_dwell = 2m

# In lockdown mode, keep ICMP types needed for PMTUD and IPv6 neighbour
# discovery flowing.  Turning this off in lockdown will strand IPv6 and break
# large packets.  There is no good reason to turn it off.
#   -> fw_config.flags bit CALY_F_LOCKDOWN_ICMP
lockdown_allow_icmp = yes


# -----------------------------------------------------------------------------
[telemetry]
# -----------------------------------------------------------------------------

# Emit events to userspace.  Uses BPF_MAP_TYPE_RINGBUF on 5.8+ and falls back
# to BPF_MAP_TYPE_PERF_EVENT_ARRAY everywhere else; the loader probes and sets
# CALY_F_CAP_RINGBUF accordingly.
#   -> fw_config.flags bit CALY_F_LOG_EVENTS
log_events = yes

# Emit one event per N matching packets.  1 logs everything (do not do this
# under attack - you will spend more CPU on logging than on filtering).
# 0 disables event emission entirely while leaving the counters running.
#   -> fw_config.log_sample_rate
log_sample_rate = 100

# Hard ceiling on events per second regardless of sampling.  The dataplane
# stops emitting above this and counts the suppression in
# STAT_EVENT_SAMPLED_OUT, so you can tell sampling from loss.
#   -> fw_config.log_max_pps
log_max_pps = 1000

# Per-source packet/byte/drop accounting for `calyanti-cli top`.  Purely for
# reporting; nothing in the drop path reads it.  Costs one LRU hash update per
# packet, so turn it off if you are chasing the last few percent of throughput.
#   -> fw_config.flags bit CALY_F_SRC_STATS
src_stats = yes

#   -> fw_config.max_srcstat_entries / fw_config.srcstat_idle_ns
max_srcstat_entries = 131072
srcstat_idle_timeout = 10m
