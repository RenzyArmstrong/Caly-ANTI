# calywatch.conf - Caly Anti layer-7 log watcher configuration.
#
# Format: "key = value" lines at the top (the header), then [section] blocks.
# '#' starts a comment. Unknown keys are ignored with a warning. calywatch runs
# fine with no config at all (built-in defaults), but without [source] blocks it
# has nothing to tail, so this file is what makes it useful.
#
# SECURITY: log lines are attacker-controlled. calywatch never evals them, never
# shells out with them, and only turns a strictly-validated IP into a ban. See
# docs/SECURITY.md.

# ===========================================================================
# Backend: how a ban is enforced.
#   socket = hand the ban to the daemon's control socket (recommended: the
#            daemon does the privileged map write, so this watcher needs no
#            network/firewall privilege). auto = socket, then calyctl, then a
#            direct nft/ipset fallback. Using nft/ipset directly requires
#            relaxing the systemd unit's CapabilityBoundingSet.
# ===========================================================================
ban_backend    = socket
control_socket = /run/calyanti/control.sock

# ===========================================================================
# Ban policy. Durations take s/m/h/d suffixes.
# ===========================================================================
ban_ttl_base     = 15m     # first offence
ban_ttl_max      = 24h     # escalation ceiling
ban_escalate_num = 2       # next TTL = current * num / den
ban_escalate_den = 1
max_bans_per_min = 60      # hard cap so a log-injection flood cannot ban the world
ban_burst        = 20

# ===========================================================================
# Safety rails.
# ===========================================================================
protect_active_sessions = yes    # never ban an IP with a live management session
never_ban_private       = yes    # never ban RFC1918/ULA (spoofable, and usually you)
mgmt_ports              = 22      # protected ports (22 is forced in regardless)

# Never ban these (checked before every ban). Use network addresses, not hosts.
allow = 127.0.0.0/8 ::1/128

# Trusted reverse proxies: an X-Forwarded-For header is honoured ONLY when the
# direct peer is inside one of these prefixes. Leave commented if you have none
# (otherwise a forged header lets an attacker pick who gets banned).
# trusted_proxy = 10.0.0.0/8 192.168.0.0/16

# ===========================================================================
# State and logging.
# ===========================================================================
state_path = /var/lib/calyanti/calywatch.state
state_save = 30s          # how often the offender table is persisted
log_level  = info

# ===========================================================================
# Rule sets. A source references a rule set by its file basename (no .rules).
# Rule files are installed here by scripts/install.sh.
# ===========================================================================
rules_dir = /etc/calyanti/rules

# ===========================================================================
# Sources: what to tail. Each [source] block names a file, a glob, or a
# journald unit, plus one or more rule sets. A glob that currently matches
# nothing is fine - the package may simply not be installed on this host.
# ===========================================================================

[source]
glob  = /var/log/nginx/*access*.log
rules = nginx generic

[source]
glob  = /var/log/apache2/*access*.log
rules = apache generic

[source]
glob  = /var/log/httpd/*access*.log
rules = apache generic

[source]
path  = /var/log/auth.log
rules = sshd

[source]
path  = /var/log/secure
rules = sshd

# journald alternative for sshd on systemd hosts. If you enable this, comment
# out the two file sources above so a line is not counted twice.
# [source]
# journal = sshd.service
# rules   = sshd
