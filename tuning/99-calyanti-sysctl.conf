# =============================================================================
# Caly Anti - XDP/eBPF DDoS mitigation suite
# Kernel network tuning profile.
#
# Install to:  /etc/sysctl.d/99-calyanti-sysctl.conf
# Apply with:  tuning/apply-sysctl.sh            (safe, backs up, verifies)
#     or with: sysctl --system                   (boot path / manual)
# =============================================================================
#
#
# WHAT THIS FILE IS
# -----------------
# A tuning profile for a host that terminates or filters hostile traffic. It
# is written for the machine that runs the Caly Anti dataplane, i.e. a host
# where the interesting failure mode is "the kernel ran out of some table
# while under attack", not "the benchmark was 3% slower".
#
# Every setting below is documented with three things:
#
#     Defends:  the concrete failure this prevents.
#     Costs:    what you give up. There is always something.
#     Unsafe:   the workloads where this value is WRONG (omitted when none).
#
# If a setting is dangerous on any plausible production workload it is NOT
# applied by default. It is written with an `#OPT ` prefix, which makes it a
# comment as far as the kernel's own sysctl loader is concerned, so it can
# never be applied by accident at boot. `apply-sysctl.sh --optional` opts in.
#
#
# FILE FORMAT
# -----------
#     key = value            Applied by apply-sysctl.sh AND by `sysctl
#                            --system` at boot. This is the safe set.
#
#     #OPT key = value       NOT applied by default. Applied only by
#                            `apply-sysctl.sh --optional`, or by you deleting
#                            the `#OPT ` prefix after reading the block above
#                            it. `sysctl --system` treats it as a comment.
#
#     # anything else        Comment.
#
# Values may contain spaces (`net.ipv4.tcp_rmem` is three numbers). They must
# not contain `#` or `|`.
#
#
# ORDERING, AND THE OTHER CALY ANTI SYSCTL FILE
# ---------------------------------------------
# The installer writes a SECOND, much smaller file:
#
#     /etc/sysctl.d/98-calyanti.conf     the minimum the XDP SYN proxy needs
#     /etc/sysctl.d/99-calyanti-sysctl.conf   this file, the full profile
#
# sysctl.d files are applied in lexicographic order across all directories, so
# 99- is applied after 98- and wins on any key both files set. The two agree
# on `net.ipv4.tcp_syncookies`; if you edit one, edit the other.
#
# TRAP: both `systemd-sysctl` and procps `sysctl --system` apply the legacy
# `/etc/sysctl.conf` LAST, after every sysctl.d drop-in. If a key here is also
# in /etc/sysctl.conf, /etc/sysctl.conf wins and this file appears to have
# done nothing. `apply-sysctl.sh --check` detects exactly that and names the
# conflicting file.
#
# TRAP: every `net.*` sysctl is per network namespace. Applying this profile
# inside a container tunes that container's namespace only, and in an
# unprivileged container most of /proc/sys/net is read-only. Tune the host.
#
#
# SIZING: THE VALUES BELOW ASSUME >= 4 GB OF RAM
# ----------------------------------------------
# Three keys here are the only ones that meaningfully consume memory. Scale
# them if your host is smaller or much larger:
#
#   RAM     nf_conntrack_max   nf_conntrack_buckets   netdev_max_backlog
#   ------  -----------------  ---------------------  ------------------
#   1 GB    32768   (~10 MB)   8192                   4096
#   2 GB    65536   (~21 MB)   16384                  8192
#   4 GB    262144  (~84 MB)   65536                  16384   <- shipped
#   8 GB    524288  (~168 MB)  131072                 32768
#   32 GB+  2097152 (~670 MB)  524288                 65536
#
# A conntrack entry is ~320 bytes on x86_64 (more with accounting or helpers
# enabled); a hash bucket is 8 bytes. The rule of thumb `buckets = max / 4` is
# the kernel's own default ratio and gives an average chain length of 4.
#
# Remember that the XDP dataplane's own maps are sized separately, in
# /etc/calyanti/calyanti.conf (`max_conn_entries`, `max_rate_entries`, ...),
# and that those are LOCKED memory. Budget both.
#
#
# WHAT THIS FILE DELIBERATELY DOES NOT SET
# ----------------------------------------
#   net.ipv4.ip_forward
#       Both values are wrong for somebody. 0 breaks every router, NAT box,
#       Kubernetes node, libvirt host and Docker host on earth; 1 silently
#       turns a leaf host into a router. Whatever your machine already has is
#       almost certainly correct. Set it in your own file if you must.
#
#   net.ipv6.conf.*.disable_ipv6
#       Disabling IPv6 in the kernel does not harden anything the Caly Anti
#       IPv6 policy does not already cover, and it breaks systemd-resolved,
#       localhost ::1 listeners, and any daemon that binds a v6 wildcard.
#       If you want no IPv6 on a NIC, set `no-ipv6` on that interface in
#       /etc/calyanti/calyanti.conf and let the dataplane drop it.
#
#   fs.file-max
#       The kernel already sizes this from physical memory and it is not a
#       per-process limit. Raising it does not raise any limit an application
#       actually hits. What you want is `LimitNOFILE=` in the service unit.
#
#   net.ipv4.tcp_sack = 0
#       Every "server hardening" checklist that tells you to disable SACK is
#       repeating advice from CVE-2019-11477 (SACK Panic, June 2019), whose
#       real fix is the patched kernel you are already running. Disabling SACK
#       costs 30-90% of throughput on any lossy path. Leave it at 1.
#
#   net.ipv4.tcp_tw_recycle
#       REMOVED from the kernel in 4.12 and actively harmful before that: it
#       drops connections from any client behind NAT whose TCP timestamp clock
#       is behind another client's. If a guide tells you to set it, stop
#       reading that guide. Writing it on a modern kernel is a no-op error.
#
#
# =============================================================================
# 1. SYN FLOOD HANDLING
# =============================================================================
#
# This is the section the rest of Caly Anti depends on. Read the two blocks
# below before changing anything in it.


# -----------------------------------------------------------------------------
# net.ipv4.tcp_syncookies = 2   -- MANDATORY for the XDP SYN proxy
# -----------------------------------------------------------------------------
# 0 = never, 1 = only when the SYN queue overflows, 2 = unconditionally.
#
# It must be 2, not 1, and that is not a preference. The XDP SYN proxy answers
# an inbound SYN itself, using bpf_tcp_raw_gen_syncookie_ipv4/6(), which mints
# a cookie with the KERNEL'S OWN secret. The client's ACK then arrives at the
# stack carrying a cookie the stack must be willing to validate. At value 1
# the stack only validates cookies while the accept queue is actually
# overflowing - which it is not, because the SYN never reached it - so the ACK
# is answered with a RST and every proxied connection dies. At 2 the stack
# always validates, and the handshake completes.
#
# Defends: SYN flood. Combined with the XDP proxy, a spoofed SYN costs one
#          XDP_TX and zero kernel memory: no request sock, no accept queue
#          slot, no timer, no retransmission.
# Costs:   with 2, EVERY inbound connection is cookie-based, even when there
#          is no attack. That means: TCP Fast Open on the listen side is not
#          used; the advertised MSS is quantised to one of 8 values; and the
#          window scale / SACK-permitted / timestamp options survive only
#          because they are encoded in the TCP timestamp (see the next block).
#          On an unattacked server this is worth a low single-digit percentage
#          of connection setup efficiency. It is not worth measuring.
# Unsafe:  nowhere, on a server. On a machine that only makes OUTBOUND
#          connections it is simply inert.
#
# If your kernel is older than 5.15 the raw syncookie helpers do not exist,
# the dataplane falls back to SYN rate limiting, and the correct value here is
# 1, not 2 - at 1 the kernel uses its own SYN queue normally and only reaches
# for cookies under pressure. `apply-sysctl.sh` detects the kernel version and
# writes 1 instead of 2 automatically; `--syncookies 2` forces the issue.
net.ipv4.tcp_syncookies = 2


# -----------------------------------------------------------------------------
# net.ipv4.tcp_timestamps = 1   -- MANDATORY COMPANION TO SYNCOOKIES
# -----------------------------------------------------------------------------
# A SYN cookie is a 32-bit sequence number. There is no room in it for the
# window scale factor, SACK-permitted, or ECN. The kernel therefore hides them
# in the low bits of the TCP TIMESTAMP option of the SYN-ACK and reads them
# back out of the client's echoed timestamp.
#
# Disable timestamps while syncookies are in use and every cookie-established
# connection silently loses window scaling (capped at a 64 KB window, so
# roughly 5 Mbit/s over a 100 ms RTT no matter how fat your pipe is) and loses
# SACK (so a single lost segment costs a full RTO). This is the single most
# common self-inflicted "the DDoS protection made my site slow" bug.
#
# Defends: nothing by itself; it is load-bearing for tcp_syncookies.
# Costs:   12 bytes of TCP option space per segment, and a very weak remote
#          uptime oracle - which Linux 4.10+ closed by randomising the
#          timestamp offset per connection.
# Unsafe:  nowhere. Do not let a hardening checklist talk you into 0.
net.ipv4.tcp_timestamps = 1


# -----------------------------------------------------------------------------
# SYN queue and accept queue sizing
# -----------------------------------------------------------------------------
# tcp_max_syn_backlog is the half-open (SYN_RECV) queue. With syncookies=2 it
# is nearly decorative, because SYNs never queue - but it still governs the
# window between "the XDP dataplane was detached for a reload" and "cookies
# took over", and it is what protects you if you had to drop back to
# tcp_syncookies=1 on an old kernel.
#
# Defends: SYN flood exhausting the half-open queue and squeezing out real
#          clients during any window where cookies are not in play.
# Costs:   ~256 bytes per queued request sock, so 8192 entries is ~2 MB worst
#          case. Negligible.
net.ipv4.tcp_max_syn_backlog = 8192

# somaxconn is the ceiling on the COMPLETED-handshake accept queue, i.e. the
# cap on whatever an application passes to listen(). This is where a slow
# accept loop shows up as dropped connections during a burst.
#
# Defends: connection loss during legitimate traffic spikes and during the
#          "attack ends, everybody reconnects at once" thundering herd.
# Costs:   memory only when the queue is actually deep, and a deeper queue
#          means a longer wait before a client is served rather than an honest
#          fast failure.
# NOTE:    raising this alone does nothing. It is only a CEILING. nginx needs
#          `listen ... backlog=4096`, Go needs a matching listen backlog,
#          Java's ServerSocket takes it as a constructor argument. If the
#          application asks for 128, it gets 128.
net.core.somaxconn = 4096

# How many times a SYN-ACK is retransmitted for a half-open connection before
# the kernel gives up. Each retry doubles the timeout (1s, 3s, 7s, 15s...), so
# the default of 5 pins a request sock for ~63 seconds.
#
# Defends: memory and queue-slot amplification from a half-open flood, on any
#          path where cookies are not active.
# Costs:   a client on a genuinely bad path (satellite, congested mobile,
#          20%+ loss) gets ~7 seconds instead of ~63 to complete a handshake.
# Unsafe:  if your users are on high-loss links by design, use 4.
net.ipv4.tcp_synack_retries = 3

# tcp_abort_on_overflow: what to do when the ACCEPT queue is full.
#   0 = drop the ACK silently; the client's TCP retransmits and may succeed
#       once the application catches up.
#   1 = answer with RST; the client fails immediately and visibly.
#
# We set 0 explicitly, because the distro default is 0 and we want the value
# in the audit trail rather than left to chance.
#
# Defends (at 0): transient overload becomes latency instead of errors.
# Costs   (at 0): during sustained overload, clients pile up retransmitting
#                 into a queue that is never going to have room, which looks
#                 like a hang rather than a failure and inflates load.
# Use 1 when:     you have a load balancer in front that must fail over FAST,
#                 or you would rather see honest connection-refused errors in
#                 your metrics than mysterious multi-second latency. It is a
#                 legitimate choice; it is just not the safe default.
net.ipv4.tcp_abort_on_overflow = 0

# RFC 1337: drop RST segments that arrive for a socket in TIME_WAIT.
#
# Defends: TIME_WAIT assassination, where an attacker (or a confused NAT)
#          kills a TIME_WAIT early, freeing the 4-tuple for immediate reuse
#          and letting a delayed duplicate from the old connection be accepted
#          into the new one as valid data.
# Costs:   a TIME_WAIT that a peer genuinely wanted to tear down early lingers
#          for the full 60 seconds. Under heavy connection churn this raises
#          the TIME_WAIT count slightly - see tcp_max_tw_buckets below.
net.ipv4.tcp_rfc1337 = 1

# Blind in-window RST/SYN injection (CVE-2016-5696) is throttled by a global
# challenge-ACK budget. The original value of 100/sec made the side channel
# usable; the fix raised it and made the counter per-socket-ish. Set it high
# so an attacker cannot use the shared budget as a covert channel.
#
# Defends: off-path blind TCP injection / connection reset.
# Costs:   a few more challenge ACKs emitted under a spoofed-RST flood. The
#          XDP layer has already dropped most of them.
net.ipv4.tcp_challenge_ack_limit = 1000

# Outbound SYN retries. The default 6 means a connection to a black-holed
# address takes ~127 seconds to fail, which is how one dead dependency turns
# into an application-wide thread pool exhaustion.
#
# Defends: nothing inbound. This is a blast-radius knob for YOUR outbound
#          calls to something that has fallen over.
# Costs:   connections to a host that is merely slow to come back (a rebooting
#          database, a router reconverging) fail after ~15s instead of ~127s.
# Unsafe:  anything that depends on long connect timeouts to ride out planned
#          failovers. Leave it alone unless you know your dependencies.
#OPT net.ipv4.tcp_syn_retries = 4


# =============================================================================
# 2. RECEIVE BACKLOG, NAPI BUDGET AND SOFTIRQ
# =============================================================================
#
# These matter most in XDP GENERIC (skb) mode and on the traffic XDP passes.
# In XDP NATIVE mode a dropped packet never reaches the backlog at all, which
# is the entire point of the native rung of the ladder.


# Per-CPU queue of packets waiting for the network stack, used when packets
# are steered by RPS/RFS and by every non-NAPI path. The default of 1000 is a
# 1990s number; a 10G NIC can fill it in under a millisecond.
#
# Defends: burst loss visible as a climbing second column in
#          /proc/net/softnet_stat (packets dropped because the backlog was
#          full). That counter is the direct feedback signal for this knob.
# Costs:   memory (one pointer per slot plus the skbs themselves) and
#          latency: a deep backlog is bufferbloat inside your own kernel.
# Tune by: watching column 2 of /proc/net/softnet_stat. Zero everywhere means
#          you have enough. Do not keep raising it past that.
net.core.netdev_max_backlog = 16384

# How many packets one softirq pass may process across all NAPI instances
# before yielding, and how long it may spend doing so.
#
# Defends: RX ring overruns during a burst, which appear as `rx_dropped` or
#          `rx_missed_errors` in `ethtool -S` and as column 3 (time_squeeze)
#          in /proc/net/softnet_stat.
# Costs:   a longer softirq pass starves userspace on that CPU for longer.
#          Push these too high on a small box and you get scheduling jitter
#          and RCU stall warnings under load.
# Tune by: raising only while column 3 of /proc/net/softnet_stat is climbing.
net.core.netdev_budget = 600

# Companion time limit for netdev_budget, in microseconds. Kernel 4.14+; on
# older kernels this key does not exist and apply-sysctl.sh skips it.
net.core.netdev_budget_usecs = 4000

# Per-device weight for the legacy (non-NAPI) path. Raising it lets one device
# hog more of a softirq pass.
#
# Defends: marginal; only the legacy path and process_backlog use it.
# Costs:   fairness between devices on the same CPU.
#OPT net.core.dev_weight = 128

# Flow limit: a per-CPU heuristic that starts dropping packets from the
# heaviest flows once the backlog is more than half full, so one elephant flow
# cannot starve the rest.
#
# Defends: single-flow backlog monopolisation.
# Costs:   memory for the table, plus CPU to hash every packet into it. It is
#          also LARGELY POINTLESS ON A DDoS FILTER, because the attack traffic
#          you care about arrives as tens of thousands of tiny flows from
#          spoofed sources rather than a few elephants, and the flow-limit
#          hash then thrashes. Enable only if you have measured a real
#          single-flow starvation problem.
# NOTE:    also requires a non-zero net.core.flow_limit_cpu_bitmap, which is
#          not settable from sysctl.conf in a useful way.
#OPT net.core.flow_limit_table_len = 8192


# =============================================================================
# 3. SOCKET BUFFERS
# =============================================================================
#
# These are CEILINGS and defaults, not allocations. Raising a maximum costs
# nothing until an application actually asks for the memory. Raising a DEFAULT
# costs memory on every socket, so the defaults below are kept modest.


# Ceiling for SO_RCVBUF / SO_SNDBUF (setsockopt doubles the requested value,
# so 16 MB here means an application may ask for 8 MB).
#
# Defends: receive-window starvation on high bandwidth-delay-product paths -
#          the "our 10G transfer runs at 40 Mbit/s to Sydney" problem.
# Costs:   nothing until used; then up to this much per socket for any
#          application that asks. An application that asks for 16 MB on 10000
#          sockets will OOM your box, and that is on the application.
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# Defaults for sockets that never call setsockopt. Applies to UDP and raw
# sockets too - TCP overrides these with tcp_rmem/tcp_wmem.
#
# Defends: UDP receive drops on a busy listener (visible as RcvbufErrors in
#          /proc/net/snmp and as drops in `ss -uln`).
# Costs:   256 KB per socket, so 10k idle sockets is 2.5 GB of ceiling - but
#          the kernel only charges pages actually used, so real cost is much
#          lower. Still: do not raise these to megabytes.
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# Per-socket ancillary buffer ceiling (cmsg, TCP_ZEROCOPY completions, IP
# options, timestamping control messages).
# Defends: EPERM/ENOBUFS from control-message-heavy applications and from
#          hardware timestamping under load.
# Costs:   trivial.
net.core.optmem_max = 65536

# TCP autotuning: min, default (initial), max. The MIDDLE value is what every
# new socket starts with; the kernel grows towards the third value on its own
# when the connection warrants it. Raising only the maximum is safe; raising
# the middle value is what costs memory on every connection.
#
# Defends: throughput collapse on long-RTT paths.
# Costs:   memory proportional to the number of ACTIVE, fast connections.
net.ipv4.tcp_rmem = 4096 131072 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Let the kernel autotune the receive buffer. This is the default; it is
# spelled out here because disabling it (which some old guides suggest, in
# combination with a huge fixed rmem) is a memory-exhaustion foot-gun.
net.ipv4.tcp_moderate_rcvbuf = 1

# Floors for UDP socket memory, in bytes. Guarantees a UDP socket keeps at
# least this much buffer even when the system is over udp_mem pressure.
#
# Defends: a DNS or QUIC listener silently dropping datagrams the instant the
#          box comes under global UDP memory pressure - which is exactly when
#          a reflection flood is arriving.
# Costs:   the floor is reserved per socket under pressure.
net.ipv4.udp_rmem_min = 16384
net.ipv4.udp_wmem_min = 16384

# Global TCP/UDP memory pressure thresholds, in PAGES (4 KB), as
# min/pressure/max. The kernel derives sane values from physical RAM at boot,
# and a wrong hand-picked value here is a superb way to make a large machine
# behave like a small one (or to let TCP eat all of RAM on a small one).
#
# Only set these if you have measured `TCPMemoryPressures` climbing in
# /proc/net/netstat. The example is for a 16 GB host: pressure at 3 GB,
# hard cap at 4 GB.
#OPT net.ipv4.tcp_mem = 393216 524288 786432
#OPT net.ipv4.udp_mem = 196608 262144 393216


# =============================================================================
# 4. CONNECTION TEARDOWN AND TIME_WAIT
# =============================================================================


# How long a socket stays in FIN_WAIT_2 waiting for the peer's FIN. This is
# NOT the TIME_WAIT duration - TIME_WAIT is a hard-coded 60 seconds (2*MSL)
# and no sysctl changes it. Anyone who tells you tcp_fin_timeout shortens
# TIME_WAIT is wrong.
#
# Defends: half-closed sockets accumulating when a peer disappears mid-close,
#          which is a cheap attack (open, send FIN, vanish) and an even
#          cheaper accident (a load balancer that reboots).
# Costs:   a genuinely slow peer that needs more than 15 seconds to send its
#          FIN gets reset. In practice nothing legitimate does.
net.ipv4.tcp_fin_timeout = 15

# Ceiling on TIME_WAIT sockets. When exceeded the kernel destroys TIME_WAIT
# sockets immediately and logs "TCP: time wait bucket table overflow".
#
# Defends: memory exhaustion from connection churn - roughly 8 KB per
#          TIME_WAIT with its inet_timewait_sock and hash entries, so 262144
#          buckets is about 60-70 MB of worst case.
# Costs:   THIS ONE IS SUBTLE. Reaping a TIME_WAIT early is not free: it frees
#          the 4-tuple for immediate reuse, which is precisely the condition
#          TIME_WAIT exists to prevent, and a delayed duplicate from the old
#          connection can then be accepted by the new one. Set this generously
#          enough that you never hit it in normal operation, and treat the
#          overflow log line as an incident, not as tuning feedback.
# Unsafe:  setting it LOW as a "fix" for high TIME_WAIT counts. High TIME_WAIT
#          counts are normal on a busy server and are not a problem.
net.ipv4.tcp_max_tw_buckets = 262144

# tcp_tw_reuse: allow a TIME_WAIT socket to be reused for a new OUTBOUND
# connection when timestamps prove the old one is finished.
#   0 = never, 1 = always, 2 = loopback only (default on 4.12+).
#
# This only ever affects connections YOU initiate; it does nothing for inbound
# load. It is safe with tcp_timestamps=1, and it is the correct fix for a
# proxy or scraper exhausting its ephemeral port range.
#
# Defends: EADDRNOTAVAIL on an outbound-heavy host with high connection churn.
# Costs:   a delayed duplicate from a previous incarnation of the same
#          4-tuple can in principle be accepted. Timestamps make this
#          vanishingly unlikely.
# Unsafe:  value 2 does not exist on kernels older than 4.12 and writing it
#          there fails. Value 1 is questionable when your outbound path
#          traverses a NAT that rewrites timestamps.
#OPT net.ipv4.tcp_tw_reuse = 1

# Orphans are sockets with no file descriptor left, still finishing a close.
# tcp_max_orphans caps how many may exist; tcp_orphan_retries caps how hard
# the kernel tries to flush each one's send queue.
#
# Defends: the classic slow-drain attack - open many connections, make the
#          server queue a large response, then stop reading and close. Each
#          orphan can hold up to the full send buffer.
# Costs:   THE DEFAULT IS COMPUTED FROM RAM AND IS USUALLY RIGHT. Raising
#          max_orphans multiplies your worst-case memory by the send buffer
#          size (65536 orphans x 64 KB = 4 GB). Lowering orphan_retries to 2
#          means a client on a bad link loses the tail of its response.
# Tune by: watching for "Out of socket memory" in dmesg, which means orphans
#          OR tcp_mem, and checking `ss -s` to tell which.
#OPT net.ipv4.tcp_max_orphans = 65536
#OPT net.ipv4.tcp_orphan_retries = 2

# How many times an ESTABLISHED connection's data segment is retransmitted
# before the connection is declared dead. The default 15 is roughly 13-30
# minutes of a dead peer holding server-side state.
#
# Defends: state held for peers that vanished (mobile clients going through a
#          tunnel, a rack losing power) - the natural tail of any flood.
# Costs:   at 8 (~100 seconds), a client on a link that is genuinely down for
#          two minutes loses the connection instead of resuming it.
# Unsafe:  long-lived idle-tolerant protocols across flaky WAN links, and any
#          replication link you expect to survive a switch reboot.
#OPT net.ipv4.tcp_retries2 = 8

# TCP keepalive: when a socket has SO_KEEPALIVE set, probe an idle peer after
# `time` seconds, then every `intvl` seconds, giving up after `probes`.
# Applications must opt in; this changes nothing for those that do not.
#
# Defends: dead-peer state accumulating on long-lived connection pools, and
#          middlebox idle timeouts silently blackholing a connection.
# Costs:   a handful of extra packets per idle connection per interval. The
#          default of 7200 seconds (2 hours) is far longer than any NAT or
#          firewall idle timeout, which is why the default is useless.
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 6


# =============================================================================
# 5. EPHEMERAL PORTS AND PATH MTU
# =============================================================================


# Range used for outbound connections and for bind(port=0).
#
# Defends: ephemeral port exhaustion on a proxy or a health-check-heavy host.
#          The default lower bound of 32768 gives ~28k ports; this gives ~55k.
# Costs:   NONE, provided nothing listens inside the range. If a service binds
#          a fixed port between 10240 and 65000, an outbound connection can
#          steal it while the service is restarting and the service then fails
#          to bind. The fix is net.ipv4.ip_local_reserved_ports, not a smaller
#          range - for example:
#              net.ipv4.ip_local_reserved_ports = 11211,27015,51820
# Unsafe:  hosts running services on high fixed ports without reserving them.
#          Check with: ss -lntup | awk '{print $5}' | grep -oE '[0-9]+$' | sort -un
net.ipv4.ip_local_port_range = 10240 65000

# Packetisation-layer PMTU discovery: when a path black-holes the ICMP
# "Fragmentation Needed" messages that normal PMTUD depends on, probe for the
# working MTU instead of hanging.
#   0 = off, 1 = on only after a black hole is detected, 2 = always on.
#
# Defends: the classic "SSH connects, then hangs on the first large response"
#          failure caused by somebody upstream dropping ICMP type 3 code 4.
#          (Caly Anti itself refuses to be that somebody: the loader will not
#          let you set ICMPv4 type 3 to DROP.)
# Costs:   a few probe packets and a slightly conservative MSS on paths where
#          probing is triggered.
net.ipv4.tcp_mtu_probing = 1

# Do not collapse the congestion window back to the initial value after an
# idle period.
#
# Defends: nothing security-related. It stops long-lived keepalive
#          connections (HTTP/2, gRPC, database pools) from restarting in slow
#          start after every quiet moment.
# Costs:   a burst at the old rate after an idle gap, which can cause loss if
#          the path capacity changed while you were idle.
net.ipv4.tcp_slow_start_after_idle = 0

# TCP Fast Open. Left at whatever the distro ships (usually 1 = client only).
#   1 = client, 2 = server, 3 = both.
# Enabling the SERVER side (2 or 3) lets a client send data in the SYN, which
# means work is performed for an unvalidated source - the exact thing the SYN
# proxy exists to prevent. It also interacts badly with tcp_syncookies=2,
# where data carried in a cookie-answered SYN is discarded.
# Defends: nothing. It is a latency optimisation.
# Costs:   at 2 or 3, a new amplification and resource-consumption surface.
#OPT net.ipv4.tcp_fastopen = 1


# =============================================================================
# 6. REVERSE PATH FILTERING
# =============================================================================
#
# READ THE SEMANTICS BEFORE YOU CHANGE THESE. rp_filter is the single most
# common cause of "I applied a hardening profile and half my network died".
#
#   0 = no source validation
#   1 = STRICT (RFC 3704): the reply route for the source address must go back
#       out of the interface the packet arrived on, or the packet is dropped.
#   2 = LOOSE: the source address must be reachable via SOME interface. Only
#       genuinely unroutable sources are dropped.
#
# THE EFFECTIVE VALUE IS max(conf.all.rp_filter, conf.<iface>.rp_filter).
# It is a MAXIMUM, not an override. Setting conf.all to 0 does NOT turn off
# strict filtering on an interface that has 1, and setting conf.all to 2 makes
# every interface at least loose regardless of its own setting. conf.default
# only seeds interfaces created AFTER it is written - it does nothing to
# interfaces that already exist, which is why you must set conf.all as well.
#
# We ship LOOSE (2), not strict (1), and that is a deliberate safety choice.
#
# Defends (2): spoofed source addresses that are not routable at all. This is
#              a modest win on top of the XDP bogon filter, which already
#              drops 0/8, 127/8, 169.254/16, 224/4, 240/4 and optionally
#              RFC1918 on WAN interfaces.
# Costs   (2): a routing-table lookup per packet on the traffic XDP passed.
# Defends (1): real anti-spoofing - an attacker cannot forge a source that
#              belongs on a different interface.
# UNSAFE  (1): breaks, silently and completely, on
#                - multi-homed hosts with asymmetric routing
#                - anything using policy routing / multiple routing tables
#                  (ip rule) unless every rule is mirrored
#                - BGP anycast and ECMP where return paths differ
#                - some VPN, VRRP/keepalived and container-bridge setups
#                - any host where the default route leaves via a different
#                  NIC than the one traffic arrives on
#              The failure mode is packets vanishing with no log line unless
#              log_martians is on, and it is extremely hard to diagnose.
#
# Set 1 only after confirming `ip route get <a-real-client-ip>` names the same
# interface that client's traffic arrives on, for every interface.
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# Strict variants. Uncomment BOTH, and only after the check above.
#OPT net.ipv4.conf.all.rp_filter = 1
#OPT net.ipv4.conf.default.rp_filter = 1

# THERE IS NO rp_filter FOR IPv6. The knob does not exist. If you need source
# validation for IPv6 the only in-kernel option is an nftables rule:
#
#     table inet filter {
#       chain prerouting {
#         type filter hook prerouting priority -300;
#         fib saddr . iif oif missing drop
#       }
#     }
#
# That is a strict check and carries every caveat listed above for rp_filter=1.
# Caly Anti's own bogon filter handles ::, ::1, ff00::/8 and 0100::/64 sources
# on WAN-zone interfaces without needing it.

# Log packets dropped by rp_filter and packets with impossible source
# addresses. We set this to 0 EXPLICITLY.
#
# Defends: nothing. It is purely diagnostic.
# Costs:   under a spoofed flood - the exact moment you would want the logs -
#          this turns an inbound packet flood into an outbound disk-write
#          flood on your own box, and can wedge journald and fill /var. It is
#          rate limited by net.ipv4.icmp_ratelimit's cousin `net_ratelimit`,
#          but "rate limited" still means thousands of lines a minute.
# Turn it on TEMPORARILY, at the console, while diagnosing an rp_filter
# problem, and turn it off again.
net.ipv4.conf.all.log_martians = 0
net.ipv4.conf.default.log_martians = 0


# =============================================================================
# 7. ICMP
# =============================================================================
#
# Note the division of labour: the XDP dataplane decides which ICMP types are
# allowed IN (and refuses to let you drop type 3, or ICMPv6 types 2/133-136,
# because that breaks PMTUD and IPv6 neighbour discovery). The sysctls here
# govern what the kernel SENDS OUT and how it reacts to what it receives.


# Do not answer ICMP echo sent to a broadcast or multicast address.
#
# Defends: Smurf amplification, in which your host is used as a reflector by
#          an attacker who spoofs the victim's address into a broadcast ping.
# Costs:   `ping -b` to your subnet no longer lists you. Nothing else.
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore ICMP error messages that violate RFC 1122 (errors sent to broadcast
# and multicast destinations).
#
# Defends: log spam and a minor error-injection surface from routers that
#          reply incorrectly to broadcast traffic.
# Costs:   nothing.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Rate limit for OUTBOUND ICMP error messages, in milliseconds between
# messages of a rate-limited type. 1000 = at most one such message per second
# per destination.
#
# Defends: your host being used as an ICMP error amplifier (send traffic to
#          closed ports on a spoofed source, harvest the port-unreachables),
#          and CPU spent generating errors during a scan.
# Costs:   traceroute to and through your host becomes slower and lossier, and
#          genuine "port unreachable" feedback to a legitimate client is
#          delayed - which can slow down failure detection in UDP protocols.
net.ipv4.icmp_ratelimit = 1000

# Which ICMP types the rate limit above applies to, as a bitmask by type.
# 6168 = 0x1818 = types 3 (dest unreachable), 4 (source quench), 11 (time
# exceeded) and 12 (parameter problem). This is the kernel default and is
# spelled out here so that the value is auditable.
#
# CRITICAL: do NOT add type 0 (echo reply) or you will rate limit your own
# ping replies to one per second and every monitoring system will alarm. Do
# NOT remove type 3 without understanding that type 3 code 4 is Fragmentation
# Needed - rate limiting it is fine, dropping it black-holes PMTUD.
net.ipv4.icmp_ratemask = 6168

# Global ICMP output budget, independent of destination.
# Defends: sustained ICMP error generation as a CPU and bandwidth sink.
# Costs:   under a scan, some legitimate ICMP errors are suppressed.
net.ipv4.icmp_msgs_per_sec = 1000
net.ipv4.icmp_msgs_burst = 50

# Ignore ALL ICMP echo requests.
#
# Defends: essentially nothing. A ping flood is dropped by the XDP layer long
#          before the kernel would answer it, and every scanner alive falls
#          back to TCP probes within milliseconds.
# Costs:   your host becomes invisible to ping, which breaks Nagios/Icinga
#          host checks, cloud load balancer health checks, MTR/traceroute
#          diagnosis and every network engineer's first instinct. Security
#          teams ask for this; it is theatre, and it costs you the single most
#          useful diagnostic on the internet.
# If you must, prefer allowing ICMP only from your monitoring prefixes via the
# Caly Anti allowlist.
#OPT net.ipv4.icmp_echo_ignore_all = 1


# =============================================================================
# 8. REDIRECTS, SOURCE ROUTING AND OTHER L3 SURFACE
# =============================================================================


# ICMP redirects rewrite your routing table on the say-so of a packet.
#
# Defends: on-link man-in-the-middle via forged redirects.
# Costs:   on a LAN with more than one router where the default gateway is
#          deliberately not the best path, you lose automatic correction and
#          take an extra hop. Add a static route instead.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# "Secure" redirects are redirects accepted only from a current default
# gateway. That is still a redirect from an address an attacker on the same
# segment can spoof, so with accept_redirects=0 this must be 0 as well or the
# gateway exception re-opens the hole.
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Do not SEND redirects.
#
# Defends: leaking your routing topology, and a small amplification surface.
# Costs:   IF THIS HOST IS A ROUTER on a segment where clients use it as a
#          default gateway but a better router exists on the same segment,
#          those clients keep taking the extra hop through you. On a leaf
#          host (which is what this profile targets) there is no cost.
# Unsafe:  as above - review before applying to an actual router.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Source routing lets the sender dictate the path, including the return path.
# It has no legitimate modern use and is a classic spoofing enabler.
# Defends: source-routed spoofing and return-path hijack.
# Costs:   none. (Caly Anti also drops IPv6 routing header type 0 outright
#          when CALY_F_DROP_RH0 is set - RFC 5095 deprecated it in 2007.)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Do not allow 127/8 to appear as a source or destination on a real wire.
# Defends: loopback-source spoofing tricks against services that trust
#          127.0.0.1, in setups where a DNAT rule could otherwise make it
#          reachable.
# Costs:   breaks exotic DNAT-to-loopback designs. If you are doing that
#          deliberately, you already know.
net.ipv4.conf.all.route_localnet = 0
net.ipv4.conf.default.route_localnet = 0

# Do not learn ARP entries from gratuitous ARP / unsolicited replies.
# Defends: ARP cache poisoning on a shared segment.
# Costs:   slower failover for VRRP/keepalived/cluster IPs that rely on a
#          gratuitous ARP to move an address - failover then waits for the
#          normal ARP timeout. If you run keepalived, LEAVE THIS ALONE.
#OPT net.ipv4.conf.all.arp_accept = 0
#OPT net.ipv4.conf.all.drop_gratuitous_arp = 1

# ARP behaviour hardening: reply only for addresses configured on the
# receiving interface (arp_ignore=1), and always use the best local address as
# the source of an ARP request (arp_announce=2).
# Defends: ARP flux and cross-interface address disclosure on multi-homed
#          hosts sharing a segment.
# Costs:   REQUIRED for LVS-DR real servers; BREAKS setups that intentionally
#          answer ARP for an address held on the loopback (which is, awkwardly,
#          also LVS-DR - in that case you want arp_ignore=1 on the specific
#          interface and the VIP on lo). Do not apply blind on a load balancer.
#OPT net.ipv4.conf.all.arp_ignore = 1
#OPT net.ipv4.conf.all.arp_announce = 2


# =============================================================================
# 9. NEIGHBOUR (ARP / NDP) TABLE SIZING
# =============================================================================
#
# The neighbour table is a shared, fixed-size resource, and it is trivially
# floodable on a large L2 segment or by an IPv6 neighbour-solicitation flood
# aimed at an entire /64. When it overflows you get "neighbour table overflow"
# in dmesg and the box stops being able to talk to ANYTHING, including your
# SSH session - the failure is total, not partial.
#
# gc_thresh1 = never garbage collect below this many entries
# gc_thresh2 = soft limit; GC starts, with a 5 second grace period
# gc_thresh3 = hard limit; entries are forcibly evicted
#
# Defends: neighbour table exhaustion, both accidental (a /16 flat network)
#          and deliberate (NDP exhaustion attack against a routed /64).
# Costs:   ~128 bytes per entry, so 8192 entries is ~1 MB per address family.
# NOTE:    the real defence for a routed IPv6 /64 is not a bigger table, it is
#          not routing a /64 to a LAN segment in the first place, or using
#          `ip -6 route add blackhole <prefix>` for the unused space.
net.ipv4.neigh.default.gc_thresh1 = 1024
net.ipv4.neigh.default.gc_thresh2 = 4096
net.ipv4.neigh.default.gc_thresh3 = 8192
net.ipv6.neigh.default.gc_thresh1 = 1024
net.ipv6.neigh.default.gc_thresh2 = 4096
net.ipv6.neigh.default.gc_thresh3 = 8192

# How long an unused entry survives, and how long the GC runs between passes.
# Shorter means a flood's entries expire faster; too short means constant
# re-ARP for peers you talk to intermittently.
net.ipv4.neigh.default.gc_stale_time = 60
net.ipv6.neigh.default.gc_stale_time = 60


# =============================================================================
# 10. IP FRAGMENT REASSEMBLY
# =============================================================================
#
# Fragment reassembly is a memory-holding operation performed for unvalidated
# senders, which makes it a first-class DoS target (teardrop, rose, the
# FragmentSmack CVE-2018-5391 family). The XDP dataplane drops tiny fragments
# and frag_off==1 outright and can drop all fragments if you set
# `drop_all_frags`; these sysctls bound the damage from whatever it passes.


# High and low water marks for the reassembly queue, in bytes, plus how long a
# partial datagram is held.
#
# Defends: memory exhaustion from a flood of first-fragments that are never
#          completed. Every one of them is held for `ipfrag_time` seconds.
# Costs:   on a path that genuinely fragments heavily (some VPN and tunnel
#          topologies, NFS over UDP with large rsize), a lower threshold means
#          real datagrams are dropped mid-reassembly. If you run NFSv3 over
#          UDP with 32 KB reads, raise these substantially or move to TCP.
# NOTE:    kernel 4.17+ made reassembly far more resistant; on older kernels
#          (RHEL 8's 4.18 has the backport) these limits matter more.
net.ipv4.ipfrag_high_thresh = 4194304
net.ipv4.ipfrag_low_thresh = 3145728
net.ipv4.ipfrag_time = 15

# Drop fragments that arrive too far out of order from a given source, which
# is a strong signal of an evasion attempt rather than a real path.
# Costs: legitimate heavy reordering (rare, mostly LAG hash changes) loses a
#        datagram. 64 is the kernel default.
net.ipv4.ipfrag_max_dist = 64

# IPv6 equivalents. Note that IPv6 routers never fragment - only the source
# host does - so seeing large volumes of IPv6 fragments inbound is itself
# suspicious. Atomic fragments (a fragment header on an unfragmented packet)
# are an evasion technique and are dropped by RFC 8021-compliant kernels.
net.ipv6.ip6frag_high_thresh = 4194304
net.ipv6.ip6frag_low_thresh = 3145728
net.ipv6.ip6frag_time = 15


# =============================================================================
# 11. IPv6 SPECIFICS
# =============================================================================
#
# Everything in this section carries one shared warning: IPv6 autoconfiguration
# is how most hosts get their address and default route. A hardening setting
# that disables an autoconfiguration mechanism does not "harden" a host that
# depends on it, it disconnects it. Check how this machine gets its IPv6
# address before touching accept_ra.


# Maximum number of addresses that may be autoconfigured on an interface.
# Defends: an RA flood (an attacker advertising thousands of prefixes) making
#          the host generate thousands of addresses, each of which costs a
#          duplicate-address-detection exchange and a route.
# Costs:   a host that legitimately needs many prefixes (some ISPs, some
#          container hosts) stops configuring addresses past the limit.
# Unsafe:  set to 0 means UNLIMITED, not "none". Do not "disable" it with 0.
#OPT net.ipv6.conf.all.max_addresses = 16
#OPT net.ipv6.conf.default.max_addresses = 16

# Accept Router Advertisements.
#   0 = never, 1 = only when not forwarding, 2 = even when forwarding.
#
# Defends (0): rogue-RA attacks, which are trivial on any shared segment and
#              let an attacker become your default gateway.
# Costs   (0): IF THIS HOST GETS ITS IPv6 ADDRESS OR DEFAULT ROUTE FROM RA -
#              which is the overwhelmingly common case, including on almost
#              every cloud provider and every home/office LAN - setting 0
#              REMOVES ITS IPv6 CONNECTIVITY at the next RA lifetime expiry.
#              Not immediately. Half an hour later, long after you have
#              stopped associating it with the change.
# Only set 0 on a host with a STATIC IPv6 address and a STATIC default route.
# The right defence for rogue RAs is RA Guard on the switch.
#OPT net.ipv6.conf.all.accept_ra = 0
#OPT net.ipv6.conf.default.accept_ra = 0

# Accept routing information and gateway defaults embedded in an RA, even when
# the RA itself is accepted. These are safe to refuse on a host with a single
# upstream router.
# Defends: route injection from a forged RA on a host that still needs SLAAC.
# Costs:   multi-router segments lose more-specific route learning.
#OPT net.ipv6.conf.all.accept_ra_rtr_pref = 0
#OPT net.ipv6.conf.all.accept_ra_pinfo = 1
#OPT net.ipv6.conf.all.accept_ra_defrtr = 1

# Hop limit for outbound packets. Raising it above 64 accomplishes nothing;
# some guides suggest 255 to satisfy the NDP "must be 255" rule, but the
# kernel already sets 255 on ND packets specifically.
# (Listed only so you know it was considered and rejected.)


# =============================================================================
# 12. NETFILTER CONNTRACK
# =============================================================================
#
# WHEN THIS SECTION MATTERS
# -------------------------
# The XDP dataplane has its own conntrack-lite (`caly_conn`, an LRU hash in
# BPF, sized in /etc/calyanti/calyanti.conf, NOT here). These sysctls govern
# the KERNEL's netfilter conntrack, which is used by:
#
#   - ladder rungs 4 and 5 (nftables / iptables+ipset fallbacks),
#   - any `ct state` or `-m conntrack` rule you already have,
#   - Docker, Kubernetes, libvirt, firewalld, ufw - all of which install
#     conntrack-using rules whether you asked or not,
#   - every NAT rule on the box.
#
# If none of those apply, the nf_conntrack module may not even be loaded, the
# keys below will not exist, and apply-sysctl.sh will skip them with a note.
# That is correct behaviour, not an error. `apply-sysctl.sh --load-conntrack`
# modprobes it first if you want the sizing applied ahead of time.
#
# THE FAILURE THIS SECTION PREVENTS
# ---------------------------------
# When the conntrack table fills, the kernel logs
#
#     nf_conntrack: table full, dropping packet
#
# and drops NEW connections - including your SSH session, including the
# connections your monitoring uses to tell you what is happening. Filling it
# is cheap for an attacker: one packet per entry, and the default
# established timeout is FIVE DAYS.


# Table size. See the sizing table at the top of this file.
# Defends: conntrack table exhaustion, the cheapest state-exhaustion attack
#          there is against a stateful firewall.
# Costs:   ~320 bytes per entry of unswappable kernel memory: 262144 entries
#          is about 84 MB.
net.netfilter.nf_conntrack_max = 262144

# Hash buckets. Ratio of 1:4 against nf_conntrack_max is the kernel's own
# default and gives short chains.
#
# NOTE: on some kernels this sysctl is read-only and the value can only be set
# as a module parameter. apply-sysctl.sh handles that: it tries the sysctl,
# then /sys/module/nf_conntrack/parameters/hashsize, and `--install` persists
# it to /etc/modprobe.d/99-calyanti-conntrack.conf for the next boot.
# Defends: long hash chains turning every conntrack lookup into a linear scan,
#          which is a CPU amplification vector all by itself.
# Costs:   8 bytes per bucket. 65536 buckets is 512 KB.
net.netfilter.nf_conntrack_buckets = 65536

# ---- timeouts: the real defence, and where the defaults are indefensible ----
#
# The stock established timeout is 432000 seconds = 5 DAYS. An attacker who
# completes 200k handshakes and walks away owns your conntrack table until
# next week. Nothing legitimate needs five days; anything that does should be
# using TCP keepalives (see section 4), which refresh the entry.
#
# Defends: state exhaustion via abandoned or deliberately idled connections.
# Costs:   a connection that is idle for longer than the timeout AND does not
#          use keepalives loses its conntrack entry. The next packet on it is
#          then INVALID, and if you have a `ct state invalid drop` rule the
#          connection breaks. This bites: long-idle SSH sessions, some
#          database connection pools, IMAP IDLE, and MQTT with a long
#          keepalive. One hour plus TCP keepalives at 600s is comfortably safe;
#          if you must support hours-idle sessions without keepalives, raise
#          this to 86400 rather than reverting to five days.
net.netfilter.nf_conntrack_tcp_timeout_established = 3600

# Half-open and teardown states. These hold entries for connections that never
# completed or are already finished, and their defaults are all far too
# generous for a host under attack.
# Defends: SYN-flood and FIN/close-flood state accumulation.
# Costs:   a handshake across a very slow path (>15s to complete) has to start
#          over. Set syn_recv to 30 if you serve satellite or deep-rural links.
net.netfilter.nf_conntrack_tcp_timeout_syn_sent = 30
net.netfilter.nf_conntrack_tcp_timeout_syn_recv = 15
net.netfilter.nf_conntrack_tcp_timeout_fin_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 15
net.netfilter.nf_conntrack_tcp_timeout_last_ack = 15
net.netfilter.nf_conntrack_tcp_timeout_close = 10

# UDP has no teardown, so its timeout IS its state budget. The default 30s
# means one spoofed UDP packet costs you an entry for half a minute - and a
# reflection flood is millions of packets from millions of sources.
# Defends: UDP flood state exhaustion.
# Costs:   a UDP "session" (DNS over UDP with a slow resolver, QUIC before it
#          establishes, a game protocol with sparse keepalives) that is idle
#          longer than the timeout loses its NAT mapping - which matters ONLY
#          if this box does NAT. Raise udp_timeout_stream, not udp_timeout, if
#          you NAT long-lived UDP.
net.netfilter.nf_conntrack_udp_timeout = 15
net.netfilter.nf_conntrack_udp_timeout_stream = 120

# ICMP echo state and the catch-all for protocols with no tracker (GRE without
# the helper, ESP, SCTP on kernels without the SCTP tracker, protocol 0).
# Defends: ping-flood and unknown-protocol state accumulation. The generic
#          default of 600 seconds is a very large budget for traffic nobody
#          can even parse.
# Costs:   ESP/GRE tunnels idle longer than 120s re-create their entry, which
#          is free unless you NAT them. If you NAT IPsec or GRE, raise
#          generic_timeout to 600 again.
net.netfilter.nf_conntrack_icmp_timeout = 15
net.netfilter.nf_conntrack_generic_timeout = 120

# Loose tracking: adopt an existing connection from a mid-stream packet that
# has no handshake.
#
# Defends (0): an ACK flood creating a conntrack entry per spoofed packet.
#              This is a real and very cheap attack against a stateful
#              firewall, and 0 is the single most effective conntrack
#              hardening switch there is.
# Costs   (0): connections that were established BEFORE conntrack saw them are
#              classified INVALID. That happens after a firewall reload that
#              flushes conntrack, on a failover to a standby firewall that has
#              no state, and on genuinely asymmetric paths where you only see
#              one direction. If you have `ct state invalid drop`, those
#              connections die.
# Unsafe:  active/passive firewall pairs without conntrackd state sync, and
#          any asymmetric routing topology.
net.netfilter.nf_conntrack_tcp_loose = 0

# Per-flow packet/byte accounting inside conntrack.
# Defends: nothing.
# Costs:   16 extra bytes per entry and a counter update per packet. Off is
#          the default and the right answer - Caly Anti's own per-source stats
#          (caly_top4/caly_top6) already give you top talkers, in BPF, without
#          touching the conntrack fast path.
net.netfilter.nf_conntrack_acct = 0

# Verify L4 checksums before tracking.
# Defends: state created by corrupt packets that the endpoint will discard.
# Costs:   CPU per packet - and it is WRONG on any interface with RX checksum
#          offload where the NIC already validated (the kernel knows, so this
#          is usually free). Set 0 only if you have measured it hurting.
net.netfilter.nf_conntrack_checksum = 1

# Automatic conntrack helpers (FTP, SIP, TFTP, IRC, H.323, PPTP ALGs).
# Auto-assignment has been off by default since kernel 4.7 because helpers
# parse attacker-controlled payloads in the kernel and have a long CVE history
# (and because an FTP helper lets a remote peer punch arbitrary holes).
#
# Defends: a genuinely large kernel attack surface and unintended pinholes.
# Costs:   passive FTP, SIP, and PPTP through NAT stop working unless you
#          attach the helper explicitly with an nftables `ct helper` object or
#          `-j CT --helper ftp`. If this box NATs FTP or SIP, you must do that
#          before applying this.
net.netfilter.nf_conntrack_helper = 0

# Be liberal about TCP window tracking: do not mark out-of-window segments
# INVALID.
# Defends: nothing.
# Costs:   window tracking is a real (if modest) defence against blind
#          in-window injection. Enable ONLY when asymmetric routing or a
#          conntrack-flushing reload is causing legitimate traffic to be
#          marked INVALID and you cannot fix the topology.
#OPT net.netfilter.nf_conntrack_tcp_be_liberal = 1

# Cap on expectation entries (the pinholes helpers create). Only relevant when
# helpers are in use; keep it small so a helper cannot be used to flood the
# expectation table.
#OPT net.netfilter.nf_conntrack_expect_max = 1024


# =============================================================================
# 13. BPF / XDP RUNTIME
# =============================================================================


# JIT-compile BPF programs instead of interpreting them.
#
# Defends: nothing directly - but an interpreted XDP program is roughly 3-6x
#          slower, and on a DDoS filter the whole design assumes the fast
#          path is fast. Some hardened kernels and some container images ship
#          this at 0.
# Costs:   none on any supported architecture. (On kernels built without
#          CONFIG_BPF_JIT_ALWAYS_ON this key exists; where ALWAYS_ON is set it
#          may be read-only at 1, and apply-sysctl.sh will report it as
#          already correct.)
net.core.bpf_jit_enable = 1

# Constant blinding in the JIT: 0 = off, 1 = for unprivileged programs,
# 2 = for all programs.
#
# Defends (1/2): JIT spraying, where an attacker who can load BPF encodes
#                shellcode in program constants. Caly Anti loads its programs
#                as root from a signed-by-your-package-manager object, so the
#                threat model here is other, unprivileged BPF users on the box.
# Costs   (2):   10-30% throughput on the XDP fast path, because every
#                constant becomes a load plus an XOR. That is a real cost on
#                the component whose entire job is per-packet speed.
# Set 2 only on a genuinely multi-tenant host where untrusted users can load
# BPF (which, by itself, you should not allow - see the next key).
net.core.bpf_jit_harden = 0

# Emit JIT symbols to /proc/kallsyms so perf, bpftool and stack traces can
# resolve BPF program addresses.
# Defends: nothing. It is the difference between a readable and an unreadable
#          `perf top` when you are diagnosing a performance problem at 3 a.m.
# Costs:   kernel addresses of BPF programs become visible to root only
#          (kptr_restrict still applies).
net.core.bpf_jit_kallsyms = 1

# Total memory the JIT may use for compiled programs, in bytes. Raise it only
# if program load fails with -ENOTSUPP/-ENOMEM on a box with many BPF users
# (Cilium, Calico, systemd, and Caly Anti all compete for this pool).
#OPT net.core.bpf_jit_limit = 528482304

# Whether unprivileged users may call bpf(). 0 = allowed, 1 = denied,
# 2 = denied with a hard error.
#
# Defends: a very large local privilege escalation surface. Most BPF CVEs of
#          the last decade require unprivileged BPF to be reachable.
# Costs:   nothing for Caly Anti (it loads as root). Breaks unprivileged
#          seccomp-BPF-adjacent tooling on some systems, and some sandboxes.
# UNSAFE TO APPLY CASUALLY: on kernel 5.16 and newer, writing 1 is a ONE-WAY
#          LATCH. The key becomes read-only until the next reboot; you cannot
#          undo it, and neither can apply-sysctl.sh --revert. Many distros
#          (Ubuntu 20.04+, Debian 11+) already default it to 1 or 2.
#OPT kernel.unprivileged_bpf_disabled = 1

# Global RFS flow table size (must be a power of two). This is the ONLY sysctl
# that Receive Flow Steering needs; the per-queue half (rps_flow_cnt) lives in
# sysfs and is written by nic-tuning.sh.
#
# Defends: cache-miss overhead from a flow being processed on a different CPU
#          than the application that reads it.
# Costs:   4 bytes per entry, plus a hash insert per packet - AND, on a DDoS
#          filter specifically, RFS is often a NET LOSS: a spoofed-source
#          flood inserts a new flow per packet and thrashes the table, so you
#          pay the hashing cost and get none of the locality benefit. This is
#          why nic-tuning.sh leaves RFS OFF unless you pass --rfs.
#OPT net.core.rps_sock_flow_entries = 32768


# =============================================================================
# 14. THROUGHPUT KNOBS THAT ARE NOT DEFENCES
# =============================================================================
#
# Listed so that you do not go looking for them elsewhere, and so that it is
# clear they are performance choices rather than mitigations.


# BBR congestion control plus the fq qdisc. BBR usually wins on lossy or
# bufferbloated paths and usually loses nothing on clean ones.
#
# Defends: nothing. It does make a link recovering from an attack converge
#          faster, because BBR does not treat loss as congestion.
# Costs:   tcp_bbr must be built or modprobed (`modprobe tcp_bbr`), and BBRv1
#          can be unfair to CUBIC flows sharing a shallow-buffered bottleneck.
#          `fq` is an EGRESS qdisc and has no interaction with XDP, which is
#          ingress-only.
# Check availability first:  sysctl net.ipv4.tcp_available_congestion_control
#OPT net.core.default_qdisc = fq
#OPT net.ipv4.tcp_congestion_control = bbr

# The initial congestion window and initial receive window are NOT sysctls on
# Linux. They are per-route attributes:
#     ip route change default via <gw> dev <if> initcwnd 10 initrwnd 10
# Anything that tells you to set net.ipv4.tcp_init_cwnd is describing a kernel
# that does not exist.


